kind = "web"
previewPath = "/"
title = "Panel Guard - IT Solutions"
version = "1.0.0"
id = "artifacts/panel-guard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22387
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/panel-guard run dev"

[services.env]
PORT = "22387"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/panel-guard", "run", "build"]
publicDir = "artifacts/panel-guard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
